version: "3"

tasks:
  test:
    desc: Run the full test suite under tests/
    cmds:
      # PYTHONUNBUFFERED: unbuffer child server processes spawned by tests.
      # --no-cov: global pytest-cov can interact badly with traced code; use task test:coverage when needed.
      - PYTHONUNBUFFERED=1 pytest tests/ -v --tb=short --durations=10 --no-cov

  test:all:
    desc: Same as task test (full suite)
    cmds:
      - task: test

  test:italian:
    desc: Run Italian voice consistency tests (hits Edge; may flake if service varies audio)
    cmds:
      - PYTHONUNBUFFERED=1 pytest tests/test_italian_voice_consistency.py -v --durations=10 --no-cov

  test:e2e:
    desc: Run all tests in test_e2e_tts.py (includes slow whisper cases)
    cmds:
      - PYTHONUNBUFFERED=1 pytest tests/test_e2e_tts.py -v --durations=10 --no-cov

  test:e2e:fast:
    desc: E2e HTTP probes only (no slow whisper tests)
    cmds:
      - PYTHONUNBUFFERED=1 pytest tests/test_e2e_tts.py -v --durations=10 --no-cov -m "not slow"

  test:watch:
    desc: Run tests in watch mode (requires pytest-watch)
    cmds:
      - pytest-watch tests/ -v

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - PYTHONUNBUFFERED=1 pytest tests/ -v --cov=app --cov-report=html --cov-report=term --durations=10

  install:
    desc: Install dependencies
    cmds:
      - pip install -r requirements.txt
      - pip install -r requirements-test.txt

  install:dev:
    desc: Install development dependencies
    cmds:
      - pip install -r requirements.txt
      - pip install -r requirements-test.txt
      - pip install pytest-watch pytest-cov

  build-push:
    desc: Build and push Docker image
    cmds:
      # If pip fails with SSL to PyPI (corporate TLS inspection): PIP_USE_TRUSTED_PYPI=true task build-push
      - ./build-multi-platform.sh --ffmpeg --push

  run:
    desc: Run the TTS server locally
    cmds:
      - python app/server.py

  clean:
    desc: Clean up generated files
    cmds:
      - rm -rf __pycache__ app/__pycache__ tests/__pycache__
      - rm -rf .pytest_cache
      - rm -rf htmlcov
      - rm -rf .coverage
      - find . -type f -name "*.pyc" -delete
      - find . -type d -name "__pycache__" -delete
